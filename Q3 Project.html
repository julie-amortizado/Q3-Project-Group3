<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmation Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        nav.footer-navbar{
            margin-top: auto;
        }

        nav.top-navbar{
            position: sticky;
            top: 0;
        }

        body{
            min-height: 100vh; 
            font-family: Poppins;
            background-image: url(https://i.pinimg.com/1200x/17/36/85/17368539b21197923004831ebbdcd194.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }

        div{
            border-radius: 15px;
        }

        .confirmation-card {
            background: rgba(0, 0, 0, 0.85);
            padding: 3rem 4rem;
            max-width: 600px;
        }

        .verify-link {
            text-decoration: underline;
            transition: color 0.3s ease;
        }

        .verify-link:hover {
            color: #8ec5fc !important;
        }

        .nav-link, .navbar-text-link, .btn-link-text {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark top-navbar">
        <div class="container-fluid">
        <div class="collapse navbar-collapse" id="mynavbar">
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Fare Matrix</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Schedule</a></li>
            <li class="nav-item"><a class="nav-link" href="academics.html">Help</a></li>
        </ul>

            <form class="d-flex">
            <a href="#" style="margin-left: 850px; margin-right: 20px;">Book Now!</a>
            <button class="btn btn-primary" type="button"><a href="registration.html" >Create Account</a></button>
            </form>
            </div>
        </div>
    </nav>

    <div class="container my-5 d-flex justify-content-center align-items-center flex-grow-1">

        <div class="text-light text-center confirmation-card">

        <h1 class="mb-4"><b>Your account has been created.</b></h1>
        <details class="ontoggle">
            <summary>Click here to verify your email</summary>
             <a href="verify_email.html" class="verify-link text-primary fs-5">verify_email.html</a>
        </details>
        </div>
    </div>


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark text-light footer-navbar ">
        <div class="container text-center mx-auto d-block">
            <h6>Group 3 | 9-Ruby 2025-2026</h1>
        </div>
    </nav>


    <script>
        const verifyLink = document.querySelector('.verify-link');
        verifyLink.addEventListener('click', function(e) {
            e.preventDefault();
            alert('Verification link clicked! Redirecting to email verification page...');
            window.location.href = this.getAttribute('href');
        });
    </script>

</body>
</html>
